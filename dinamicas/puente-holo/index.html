<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISUAL // Puente de Mando Holografico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ============================================================
       VISUAL: PUENTE DE MANDO HOLOGRAFICO
       Showcase del lenguaje visual para el Instituto: un mapa
       tactico proyectado en holograma con tres sectores del puerto
       (Astillero, Terminal de Contenedores, Terminal Multiproposito)
       y los dos mentores del programa hablando por consola:

         MENTOR IA (cian)     — el arte de lo posible
         EL CORONEL (ambar)   — gobernanza y criterio humano

       Es una pieza VISUAL, sin mecanica de juego: la camara recorre
       los sectores en modo cine mientras los mentores dialogan.

       Interaccion ligera:
       - Arrastrar: orbitar la proyeccion (vuelve sola al modo cine)
       - Teclas 1-3: saltar al sector
       - ESPACIO: pausa

       PERSONALIZAR: sectores y guion en las constantes BASES y
       PHASES de js/holo.js; paleta en las variables de styles.css.
       ============================================================ -->

  <canvas id="dust" aria-hidden="true"></canvas>

  <div class="viewport" id="viewport">
    <div class="world" id="world"><!-- escena construida por js/holo.js --></div>
  </div>

  <div class="scanlines" aria-hidden="true"></div>

  <div class="frame" aria-hidden="true">
    <i class="frame__c frame__c--tl"></i>
    <i class="frame__c frame__c--tr"></i>
    <i class="frame__c frame__c--bl"></i>
    <i class="frame__c frame__c--br"></i>
  </div>

  <header class="hud hud--top">
    <div class="hud__brand"><i></i><span>INSTITUTO HP // PUENTE DE MANDO</span></div>
    <span class="hud__phase" id="hud-phase">INICIALIZANDO PROYECCION...</span>
  </header>

  <aside class="mentor mentor--ia" id="mentor-ia">
    <div class="mentor__head">
      <span class="mentor__avatar" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="mentor__name">MENTOR IA // NODO CORTEX</span>
    </div>
    <p class="mentor__text"><span id="txt-ia"></span><i class="caret" id="caret-ia"></i></p>
    <div class="mentor__meter" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </aside>

  <aside class="mentor mentor--cnl" id="mentor-cnl">
    <div class="mentor__head">
      <span class="mentor__avatar" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="mentor__name">CNL. R. MENDOZA // COMANDANCIA</span>
    </div>
    <p class="mentor__text"><span id="txt-cnl"></span><i class="caret" id="caret-cnl"></i></p>
    <div class="mentor__meter" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
  </aside>

  <footer class="hud hud--bottom">
    <span id="hud-status">PROYECCION TACTICA EN CURSO</span>
    <span class="hud__keys">arrastra para orbitar &middot; 1-3 sectores &middot; espacio pausa</span>
  </footer>

  <script src="js/holo.js"></script>
</body>
</html>
