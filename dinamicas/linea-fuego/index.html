<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DINAMICA // Linea de Fuego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ============================================================
       DINAMICA: LINEA DE FUEGO (seguridad)
       6 maniobras vistas desde arriba. En cada una hay CUATRO
       posiciones marcadas (A-D) y solo una esta FUERA de la linea
       de fuego. Clic en la segura antes de que corra el tiempo;
       al responder se revelan las zonas de peligro en rojo y la
       regla que las explica.

       CONTROLES: clic/toque en la posicion (o teclas A-D / 1-4)
       R reinicia la ronda completa.

       PERSONALIZAR: cada ronda es un <g class="round"> del SVG con
       sus .spot (data-safe) y sus .danger; el motor las recorre.
       ============================================================ -->

  <header class="hud hud--top">
    <div class="hud__brand"><i></i><span>LINEA DE FUEGO</span></div>
    <div class="meters">
      <span class="meter">RONDA <b id="m-round">1/--</b></span>
      <span class="meter">PTS <b id="m-score">0</b></span>
      <span class="meter">RACHA <b id="m-streak">0</b></span>
    </div>
  </header>

  <div class="timerbar"><i id="timer-fill"></i></div>

  <main class="board">
    <div class="scene-wrap">
      <p class="prompt" id="prompt">--</p>
      <svg id="scene" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid meet">

        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#FFC627"/>
          </marker>
        </defs>

        <!-- piso comun -->
        <rect x="0" y="0" width="1200" height="560" fill="#6e7c8a"/>
        <g stroke="rgba(255,255,255,0.07)" stroke-width="2">
          <path d="M 0 140 H 1200 M 0 280 H 1200 M 0 420 H 1200 M 200 0 V 560 M 400 0 V 560 M 600 0 V 560 M 800 0 V 560 M 1000 0 V 560"/>
        </g>

        <!-- ============ RONDA 1: grua girando con carga ============ -->
        <g class="round" data-prompt="La grua movil gira con carga suspendida. Donde te paras?"
           data-why="FUERA DEL RADIO DE GIRO Y NUNCA BAJO LA PLUMA: LA CARGA BARRE TODO EL ARCO">
          <path class="danger" d="M 430 280 m -310 0 a 310 310 0 1 0 620 0 a 310 310 0 1 0 -620 0 Z M 430 280 m -90 0 a 90 90 0 1 1 180 0 a 90 90 0 1 1 -180 0 Z" fill-rule="evenodd"/>
          <circle cx="430" cy="280" r="56" fill="#FFC627" stroke="#8a6a0a" stroke-width="3"/>
          <rect x="402" y="252" width="56" height="56" rx="8" fill="#EE7523" stroke="#8a4a10" stroke-width="2.5"/>
          <path d="M 430 280 L 700 180" stroke="#2c3a4d" stroke-width="10" stroke-linecap="round"/>
          <rect x="668" y="150" width="86" height="44" fill="#0b78c2" stroke="#08507f" stroke-width="2.5"/>
          <path d="M 700 180 q 60 90 -20 150" stroke="#FFC627" stroke-width="3" stroke-dasharray="8 7" fill="none" marker-end="url(#arr)"/>
          <g class="spot" data-k="A" data-safe="false"><circle cx="700" cy="330"/><text x="700" y="330">A</text></g>
          <g class="spot" data-k="B" data-safe="false"><circle cx="560" cy="120"/><text x="560" y="120">B</text></g>
          <g class="spot" data-k="C" data-safe="false"><circle cx="240" cy="430"/><text x="240" y="430">C</text></g>
          <g class="spot" data-k="D" data-safe="true"><circle cx="1010" cy="440"/><text x="1010" y="440">D</text></g>
          <path d="M 880 360 l 50 28 m 0 -28 l -50 28" stroke="#FFC627" stroke-width="6"/>
          <path d="M 850 330 L 960 330" stroke="#FFC627" stroke-width="5" stroke-dasharray="14 10"/>
        </g>

        <!-- ============ RONDA 2: camion en reversa ============ -->
        <g class="round" hidden data-prompt="El camion va en REVERSA hacia la rampa. Donde te paras?"
           data-why="ATRAS DE UN VEHICULO EN REVERSA NO EXISTES PARA EL ESPEJO: SIEMPRE AL COSTADO DEL OPERADOR, A LA VISTA">
          <path class="danger" d="M 640 230 L 1080 130 L 1140 280 L 1080 430 L 640 330 Z"/>
          <rect x="380" y="230" width="260" height="100" rx="8" fill="#0d4486" stroke="#0a1f3f" stroke-width="3"/>
          <rect x="320" y="240" width="60" height="80" rx="6" fill="#002E6D"/>
          <rect x="330" y="252" width="18" height="56" fill="#9fd8ff"/>
          <circle cx="420" cy="342" r="15" fill="#1d2837"/>
          <circle cx="540" cy="342" r="15" fill="#1d2837"/>
          <circle cx="600" cy="342" r="15" fill="#1d2837"/>
          <path d="M 660 280 H 850" stroke="#FFC627" stroke-width="4" stroke-dasharray="10 9" marker-end="url(#arr)"/>
          <rect x="1080" y="120" width="22" height="320" fill="#5d6b80"/>
          <g class="spot" data-k="A" data-safe="false"><circle cx="800" cy="280"/><text x="800" y="280">A</text></g>
          <g class="spot" data-k="B" data-safe="false"><circle cx="980" cy="170"/><text x="980" y="170">B</text></g>
          <g class="spot" data-k="C" data-safe="true"><circle cx="290" cy="140"/><text x="290" y="140">C</text></g>
          <g class="spot" data-k="D" data-safe="false"><circle cx="700" cy="430"/><text x="700" y="430">D</text></g>
        </g>

        <!-- ============ RONDA 3: cabo en tension (snap-back) ============ -->
        <g class="round" hidden data-prompt="El cabo de amarre esta EN TENSION. Donde te paras?"
           data-why="UN CABO QUE REVIENTA LATIGUEA EN SU LINEA Y MAS ALLA DE SUS ANCLAS: ZONA SNAP-BACK SIEMPRE DESPEJADA">
          <path class="danger" d="M 150 520 L 90 420 L 950 60 L 1010 160 Z"/>
          <path class="danger" d="M 90 420 L 0 460 L 60 560 L 150 520 Z"/>
          <path class="danger" d="M 950 60 L 1010 0 L 1110 60 L 1010 160 Z"/>
          <rect x="0" y="430" width="1200" height="130" fill="#8d99a6"/>
          <circle cx="140" cy="470" r="26" fill="#2c3a4d"/>
          <circle cx="140" cy="470" r="12" fill="#5d6b80"/>
          <path d="M 980 110 q 30 14 60 10 l 80 30 q 40 30 80 30 V 0 h -240 Z" fill="#0d4486"/>
          <path d="M 140 470 L 980 110" stroke="#c8a86a" stroke-width="8"/>
          <path d="M 150 466 L 974 114" stroke="#8a6a42" stroke-width="2.5" stroke-dasharray="3 6"/>
          <g class="spot" data-k="A" data-safe="false"><circle cx="560" cy="290"/><text x="560" y="290">A</text></g>
          <g class="spot" data-k="B" data-safe="false"><circle cx="60" cy="500"/><text x="60" y="500">B</text></g>
          <g class="spot" data-k="C" data-safe="true"><circle cx="450" cy="500"/><text x="450" y="500">C</text></g>
          <g class="spot" data-k="D" data-safe="false"><circle cx="1040" cy="80"/><text x="1040" y="80">D</text></g>
        </g>

        <!-- ============ RONDA 4: montacargas en pasillo ============ -->
        <g class="round" hidden data-prompt="El montacargas recorre el pasillo cargado. Donde te paras?"
           data-why="EN PASILLOS DE EQUIPO, EL PEATON VA EN LOS REFUGIOS MARCADOS, NUNCA EN LA RUTA NI EN LAS ESQUINAS CIEGAS">
          <path class="danger" d="M 140 230 H 1060 V 330 H 140 Z"/>
          <path class="danger" d="M 690 120 L 800 230 L 690 230 Z"/>
          <g fill="#39434c">
            <rect x="140" y="120" width="550" height="90"/>
            <rect x="800" y="120" width="260" height="90"/>
            <rect x="140" y="350" width="370" height="90"/>
            <rect x="620" y="350" width="440" height="90"/>
          </g>
          <g fill="#0b78c2" opacity="0.6">
            <rect x="160" y="135" width="90" height="60"/><rect x="270" y="135" width="90" height="60"/>
            <rect x="820" y="135" width="90" height="60"/><rect x="930" y="135" width="90" height="60"/>
            <rect x="160" y="365" width="90" height="60"/><rect x="640" y="365" width="90" height="60"/>
          </g>
          <rect x="300" y="248" width="86" height="62" rx="6" fill="#FFC627" stroke="#8a6a0a" stroke-width="3"/>
          <rect x="386" y="258" width="30" height="42" fill="#2c3a4d"/>
          <path d="M 420 262 h 36 M 420 296 h 36" stroke="#5d6b80" stroke-width="7"/>
          <path d="M 470 280 H 640" stroke="#FFC627" stroke-width="4" stroke-dasharray="10 9" marker-end="url(#arr)"/>
          <rect x="514" y="350" width="100" height="90" fill="#2e8b57" opacity="0.85"/>
          <text x="564" y="402" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="13" font-weight="800" fill="#fff">REFUGIO</text>
          <g class="spot" data-k="A" data-safe="false"><circle cx="760" cy="280"/><text x="760" y="280">A</text></g>
          <g class="spot" data-k="B" data-safe="false"><circle cx="722" cy="196"/><text x="722" y="196">B</text></g>
          <g class="spot" data-k="C" data-safe="true"><circle cx="564" cy="395"/><text x="564" y="398">C</text></g>
          <g class="spot" data-k="D" data-safe="false"><circle cx="210" cy="280"/><text x="210" y="280">D</text></g>
        </g>

        <!-- ============ RONDA 5: izaje con viento ============ -->
        <g class="round" hidden data-prompt="Izaje con VIENTO de la izquierda. Donde te paras?"
           data-why="CON VIENTO, LA CARGA DERIVA A SOTAVENTO Y EL CONTRAPESO BARRE ATRAS: POSICION A BARLOVENTO, LEJOS Y A LA VISTA DEL OPERADOR">
          <path class="danger" d="M 620 90 q 330 90 330 190 q 0 100 -330 190 Z"/>
          <path class="danger" d="M 280 180 a 130 130 0 0 0 0 200 L 380 280 Z"/>
          <g stroke="#9fd8ff" stroke-width="5" stroke-linecap="round">
            <path d="M 60 160 h 90 M 40 220 h 110 M 60 280 h 90" marker-end="url(#arr)"/>
          </g>
          <text x="95" y="135" font-family="Montserrat, sans-serif" font-size="15" font-weight="800" fill="#9fd8ff">VIENTO</text>
          <rect x="360" y="240" width="140" height="80" rx="8" fill="#FFC627" stroke="#8a6a0a" stroke-width="3"/>
          <rect x="310" y="255" width="50" height="50" fill="#39434c"/>
          <path d="M 470 268 L 620 180" stroke="#2c3a4d" stroke-width="9" stroke-linecap="round"/>
          <rect x="588" y="160" width="76" height="40" fill="#b3422c" stroke="#5e1f12" stroke-width="2.5"/>
          <circle cx="430" cy="345" r="13" fill="#1d2837"/>
          <circle cx="480" cy="345" r="13" fill="#1d2837"/>
          <g class="spot" data-k="A" data-safe="false"><circle cx="790" cy="280"/><text x="790" y="280">A</text></g>
          <g class="spot" data-k="B" data-safe="false"><circle cx="250" cy="280"/><text x="250" y="280">B</text></g>
          <g class="spot" data-k="C" data-safe="false"><circle cx="640" cy="100"/><text x="640" y="100">C</text></g>
          <g class="spot" data-k="D" data-safe="true"><circle cx="180" cy="480"/><text x="180" y="480">D</text></g>
        </g>

        <!-- ============ RONDA 6: apertura de puertas de contenedor ============ -->
        <g class="round" hidden data-prompt="Van a abrir un contenedor que llego con la carga movida. Donde te paras?"
           data-why="LA CARGA MAL ESTIBADA SE VIENE ENCIMA AL ABRIR: SE ABRE DETRAS DE LA HOJA DE LA PUERTA, NUNCA DE FRENTE">
          <path class="danger" d="M 540 320 L 380 560 L 820 560 L 660 320 Z"/>
          <path class="danger" d="M 660 320 L 840 360 L 800 470 Z"/>
          <rect x="440" y="100" width="320" height="220" fill="#EE7523" stroke="#9c4a12" stroke-width="3"/>
          <path d="M 452 100 v 220 M 476 100 v 220 M 500 100 v 220 M 524 100 v 220 M 548 100 v 220 M 572 100 v 220 M 596 100 v 220 M 620 100 v 220 M 644 100 v 220 M 668 100 v 220 M 692 100 v 220 M 716 100 v 220 M 740 100 v 220" stroke="#9c4a12" stroke-width="2" opacity="0.5"/>
          <path d="M 600 100 v 220" stroke="#5e2c0a" stroke-width="4"/>
          <rect x="660" y="316" width="180" height="14" fill="#c8742e" stroke="#9c4a12" stroke-width="2" transform="rotate(18 660 320)"/>
          <path d="M 560 340 q 30 60 0 110" stroke="#FFC627" stroke-width="3.5" stroke-dasharray="8 7" fill="none" marker-end="url(#arr)"/>
          <g class="spot" data-k="A" data-safe="false"><circle cx="600" cy="430"/><text x="600" y="430">A</text></g>
          <g class="spot" data-k="B" data-safe="false"><circle cx="780" cy="400"/><text x="780" y="400">B</text></g>
          <g class="spot" data-k="C" data-safe="true"><circle cx="920" cy="250"/><text x="920" y="250">C</text></g>
          <g class="spot" data-k="D" data-safe="false"><circle cx="470" cy="480"/><text x="470" y="480">D</text></g>
        </g>

      </svg>
    </div>
  </main>

  <div class="verdict" id="verdict" hidden></div>
  <div class="toast" id="toast" hidden></div>

  <div class="finale" id="finale" hidden>
    <p class="finale__kicker" id="finale-kicker">--</p>
    <h2 id="finale-title">--</h2>
    <p class="finale__score" id="finale-score">--</p>
    <p class="finale__sub" id="finale-detail">--</p>
    <button type="button" id="restart">OTRA RONDA [R]</button>
  </div>

  <footer class="hud hud--bottom">
    <span id="hud-status">ELIGE LA POSICION SEGURA ANTES DE QUE CORRA EL TIEMPO</span>
    <span class="hud__keys">clic en A-D (o teclas A-D / 1-4) · R reiniciar</span>
  </footer>

  <script src="js/linea.js"></script>
</body>
</html>
