function Counter({ to, decimals = 0, active }) {
  const [val, setVal] = useState(0);
  const done = useRef(false);
  useEffect(() => {
    if (!active || done.current) return;
    done.current = true;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { setVal(to); return; }
    const dur = 1300; let start = null;
    const tick = (now) => {
      if (start === null) start = now;
      const p = Math.min((now - start) / dur, 1);
      setVal(to * (1 - Math.pow(1 - p, 3)));
      if (p < 1) requestAnimationFrame(tick); else setVal(to);
    };
    requestAnimationFrame(tick);
  }, [active]);
  return <span className="cost__value mono">{val.toFixed(decimals)}</span>;
}

function ArchMap() {
  const [hot, setHot] = useState(null);
  const byId = (id) => NODES.find((n) => n.id === id);
  const related = new Set();
  if (hot) {
    related.add(hot);
    EDGES.forEach((e) => { if (e.a === hot) related.add(e.b); if (e.b === hot) related.add(e.a); });
  }
  const tip = hot ? byId(hot).tip : null;

  return (
    <div className="diagram">
      <svg className="diagram__svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        {EDGES.map((e, i) => {
          const A = byId(e.a), B = byId(e.b);
          const active = hot && (e.a === hot || e.b === hot);
          const dim = hot && !active;
          const cls = 'edge' + (active ? ' is-active' : '') + (dim ? ' is-dim' : '');
          return <line key={i} className={cls} x1={A.x} y1={A.y} x2={B.x} y2={B.y} vectorEffect="non-scaling-stroke" />;
        })}
      </svg>

      <div className="vnet-box" style={{ left: '34%', top: '33%', width: '50%', height: '34%' }}>
        <span className="vnet-box__label">VNET · 10.0.0.0/16</span>
      </div>

      {NODES.map((n) => {
        const cls = 'node' + (n.kind ? ' node--' + n.kind : '')
          + (hot === n.id ? ' is-active' : '')
          + (hot && !related.has(n.id) ? ' is-dim' : '');
        return (
          <button
            key={n.id}
            className={cls}
            style={{ left: n.x + '%', top: n.y + '%' }}
            onMouseEnter={() => setHot(n.id)}
            onMouseLeave={() => setHot(null)}
            onFocus={() => setHot(n.id)}
            onBlur={() => setHot(null)}
            aria-label={n.name + ': ' + n.tip}
          >
            <span className="node__name">{n.name}</span>
            <span className="node__sub mono">{n.sub}</span>
          </button>
        );
      })}

      <div className="map__tip">
        {tip ? tip : <span><span className="mono">›</span> Pasa el cursor sobre un nodo para ver sus conexiones</span>}
      </div>
    </div>
  );
}

    const slides = document.querySelectorAll('.slide');
    const c = Math.max(0, Math.min(i, slides.length - 1));
    slides[c] && slides[c].scrollIntoView({ behavior: reduce ? 'auto' : 'smooth', block: 'start' });
  };

  useEffect(() => {
    const deck = document.getElementById('deck');
    const slides = Array.from(document.querySelectorAll('.slide'));
    if (slides[0]) slides[0].classList.add('is-active');

    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        const i = slides.indexOf(e.target);
        if (e.isIntersecting && e.intersectionRatio >= 0.55) {
          e.target.classList.add('is-active');
          activeRef.current = i;
          setActive(i);
        } else if (e.intersectionRatio < 0.2) {
          e.target.classList.remove('is-active');
        }
      });
    }, { root: deck, threshold: [0, 0.2, 0.55, 0.9] });
    slides.forEach((s) => io.observe(s));

    const onKey = (ev) => {
      if (ev.target.tagName === 'BUTTON' && ev.key === ' ') return;
      if (['ArrowDown', 'ArrowRight', 'PageDown', ' '].includes(ev.key)) { ev.preventDefault(); goTo(activeRef.current + 1); }
      else if (['ArrowUp', 'ArrowLeft', 'PageUp'].includes(ev.key)) { ev.preventDefault(); goTo(activeRef.current - 1); }
      else if (ev.key === 'Home') { ev.preventDefault(); goTo(0); }
      else if (ev.key === 'End') { ev.preventDefault(); goTo(slides.length - 1); }
    };
    document.addEventListener('keydown', onKey);
    return () => { io.disconnect(); document.removeEventListener('keydown', onKey); };
  }, []);

  return (
    <React.Fragment>
      {/* HUD */}
      <div className="hud" aria-hidden="true">
        <span className="hud__bracket hud__bracket--tl"></span>
        <span className="hud__bracket hud__bracket--tr"></span>
        <span className="hud__bracket hud__bracket--bl"></span>
        <span className="hud__bracket hud__bracket--br"></span>
      </div>

      <header className="topbar">
        <div className="topbar__brand">
          <span className="topbar__logo">HUTCHISON PORTS</span>
          <span className="topbar__tag">HUB · INFRA AZURE / MVP</span>
        </div>
        <div className="topbar__status">
          <span className="status-dot"></span>
          <span className="mono">SYSTEM ONLINE</span>
        </div>
      </header>

      <div className="progress" aria-hidden="true">
        {SLIDES.map((_, i) => <span key={i} className={'progress__seg' + (i <= active ? ' is-done' : '')}></span>)}
      </div>

      <nav className="deck-nav" aria-label="Navegacion de diapositivas">
        {SLIDES.map((t, i) => (
          <button key={t} className={'nav-dot' + (i === active ? ' is-active' : '')} onClick={() => goTo(i)} aria-label={'Ir a ' + t}>
            <span className="nav-dot__mark"></span>
            <span className="nav-dot__label">{t}</span>
          </button>
        ))}
      </nav>

      <footer className="botbar">
        <span className="botbar__coords mono">[ LAT 19.19 · LON -96.13 — MEXICO CENTRAL ]</span>
        <span className="botbar__counter mono">{idx2(active)} / {idx2(SLIDES.length - 1)}</span>
      </footer>

      {/* DECK */}
      <main id="deck">
        {/* 01 PORTADA */}
        <section className="slide slide--cover" data-index="01" data-title="Portada">
          <div className="port-scene" aria-hidden="true">
            <svg className="port-skyline" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMax meet" fill="none">
              <line className="sky-water" x1="0" y1="300" x2="1440" y2="300" />
              <g className="crane crane--1">
                <path className="sky-stroke" d="M180 300 V120 M320 300 V120 M150 120 H540 M540 120 V150 M150 100 H560" />
                <line className="sky-trolley" x1="250" y1="120" x2="250" y2="170" />
                <rect className="sky-load" x="232" y="168" width="36" height="26" />
              </g>
              <g className="crane crane--2">
                <path className="sky-stroke" d="M760 300 V90 M900 300 V90 M730 90 H1180 M1180 90 V130 M730 70 H1200" />
                <line className="sky-trolley" x1="1010" y1="90" x2="1010" y2="150" />
                <rect className="sky-load" x="992" y="148" width="36" height="26" />
              </g>
              <g className="sky-containers">
                <rect x="980" y="252" width="70" height="24" /><rect x="1054" y="252" width="70" height="24" />
                <rect x="980" y="276" width="70" height="24" /><rect x="1054" y="276" width="70" height="24" />
                <rect x="1017" y="228" width="70" height="24" />
              </g>
            </svg>
            <div className="port-grid"></div>
          </div>
          <div className="slide__inner cover__inner">
            <span className="mono-label" data-reveal>[ DEPLOY_TARGET · AZURE / MEXICO CENTRAL ]</span>
            <h1 className="display-giant title-stack" data-reveal>
              <span>INFRA</span><span className="t-sky">ESTRUCTURA</span><span className="t-sunray">DEL HUB</span>
            </h1>
            <p className="body-lg" data-reveal>La infraestructura Azure que soporta al HUB Digital IHP. Cloud-native, segura por aislamiento y con costo optimizado — version MVP.</p>
            <div className="stat-strip" data-reveal>
              <div className="stat-strip__item"><strong className="mono">04</strong><span>microservicios</span></div>
              <div className="stat-strip__item"><strong className="mono">01</strong><span>region</span></div>
              <div className="stat-strip__item"><strong className="mono">~$120</strong><span>USD / mes</span></div>
            </div>
            <div className="cta-row" data-reveal>
              <button className="btn btn--sunray" onClick={() => goTo(1)}>INICIAR RECORRIDO</button>
              <span className="scroll-hint mono">SCROLL ↓</span>
            </div>
          </div>
        </section>

        {/* 02 CONCEPTO */}
        <section className="slide slide--light" data-index="02" data-title="Concepto">
          <div className="slide__inner">
            <div className="concept">
              <div className="concept__text">
                <span className="mono-label" data-reveal>[ SLIDE_02 · MODELO_MENTAL ]</span>
                <h2 className="display-lg" data-reveal>¿QUE ES UN<br /><span className="t-sky">SERVICIO</span> DE AZURE?</h2>
                <p className="body-lg" data-reveal>Imagina Azure como un puerto inteligente. Cada servicio es un <strong>contenedor</strong>: una pieza sellada que llega lista, se apila junto a las demas y se opera de forma independiente.</p>
                <p className="concept__lead" data-reveal>Toca cada contenedor para ver una propiedad:</p>
              </div>
              <div data-reveal><ConceptYard /></div>
            </div>
          </div>
        </section>

        {/* 03 MAPA */}
        <section className="slide slide--dark" data-index="03" data-title="Mapa">
          <div className="slide__inner">
            <div className="map">
              <div className="map__text">
                <span className="mono-label" data-reveal>[ SLIDE_03 · TOPOLOGIA ]</span>
                <h2 className="display-lg" data-reveal>TODO<br /><span className="t-sky">CONECTADO</span></h2>
                <p className="body-lg" data-reveal>La vista general: sigue el flujo de una peticion tipica. El usuario entra por el Frontend, que llama al Backend, y este orquesta datos, cache y archivos. Solo PostgreSQL vive dentro de la VNet.</p>
                <div className="map__legend" data-reveal>
                  <span className="legend-flow"><i></i> Flujo de una peticion · Usuario → Frontend → Backend → Datos</span>
                  <span className="legend-vnet"><b></b> Recursos dentro de la VNet (privados)</span>
                </div>
              </div>
              <div data-reveal><ArchMap /></div>
            </div>
          </div>
        </section>

        {/* 04 COMPUTO */}
        <section className="slide slide--dark" data-index="04" data-title="Computo">
          <ServicesSlide label="[ SLIDE_04 · COMPUTE ]" title="EL" accentWord="MOTOR" group="computo" />
        </section>

        {/* 05 DATOS */}
        <section className="slide slide--light" data-index="05" data-title="Datos">
          <ServicesSlide label="[ SLIDE_05 · PERSISTENCIA ]" title="DATOS" accentWord="CRITICOS" group="datos" />
        </section>

        {/* 06 ALMACENAMIENTO */}
        <section className="slide slide--dark" data-index="06" data-title="Almacenamiento">
          <ServicesSlide label="[ SLIDE_06 · ALMACENAMIENTO ]" title="LA BODEGA" accentWord="DIGITAL" group="almacenamiento" />
        </section>

        {/* 07 FRONTEND */}
        <section className="slide slide--light" data-index="07" data-title="Frontend">
          <ServicesSlide label="[ SLIDE_07 · ENTRADA & TELEMETRIA ]" title="CARA Y" accentWord="CONTROL" group="frontend" />
        </section>

        {/* 08 SEGURIDAD */}
        <section className="slide slide--ocean" data-index="08" data-title="Seguridad">
          <div className="slide__inner"><SecurityLayers /></div>
        </section>

        {/* 09 COSTOS */}
        <section className="slide slide--light" data-index="09" data-title="Costos">
          <div className="slide__inner">
            <div className="cost">
              <div className="cost__head">
                <span className="mono-label" data-reveal>[ SLIDE_09 · BURN_RATE / MENSUAL ]</span>
                <div className="cost__total" data-reveal>
                  <span className="cost__currency">$</span>
                  <Counter to={120} decimals={0} active={active === 8} />
                  <span className="cost__unit">USD<br />/mes</span>
                </div>
                <span className="badge--aqua" data-reveal>− $24 / mes vs. el diseño inicial (B3 en vez de P0V3 · SWA Free)</span>
              </div>
              <div className="cost__bars">
                {COSTS.map((c, i) => (
                  <div className="cost-row" data-reveal style={{ '--d': i }} key={c.label}>
                    <span className="cost-row__label">{c.label}</span>
                    <div className="cost-row__track"><span className="cost-row__fill" style={{ '--w': c.w }}></span></div>
                    <strong className="mono">{c.val}</strong>
                  </div>
                ))}
              </div>
              <p className="cost__footer mono" data-reveal>OPTIMIZADO PARA MEXICO CENTRAL · BALANCE COSTO / SEGURIDAD</p>
            </div>
          </div>
        </section>

        {/* 10 PRODUCCION */}
        <section className="slide slide--ocean" data-index="10" data-title="Produccion">
          <div className="slide__inner">
            <div className="sec__head">
              <div>
                <span className="mono-label" data-reveal>[ SLIDE_10 · PRODUCCION_BLINDADA ]</span>
                <h2 className="display-lg" data-reveal>CAMINO A<br /><span className="t-sunray">PRODUCCION</span></h2>
                <p className="sec__hint" data-reveal>
                  Mas seguridad y mas capacidad, ajustada a la escala real (~5,000 usuarios · 11 unidades).
                  <span className="sec__sep">·</span> No es "todo al maximo".
                </p>
              </div>
              <span className="badge--aqua" data-reveal>MVP ~$120/mes → Produccion ~$900–1,400/mes</span>
            </div>
            <div className="sec-grid">
              {PROD_CRITERIOS.map((col, ci) => (
                <div className="sec-col" data-reveal style={{ '--d': ci }} key={col.title}>
                  <h3>{col.title}</h3>
                  {col.items.map((it, ii) => {
                    const flag = it.b === 'FLAG';
                    return (
                      <div key={ii} className={'sec-item ' + (flag ? 'sec-item--mvp' : 'sec-item--pot')}>
                        <strong>
                          <span className={'sec-badge ' + (flag ? 'sec-badge--mvp' : 'sec-badge--pot')}>{it.b}</span>
                          {it.n}
                        </strong>
                        <p>{it.d}</p>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* 11 CIERRE */}
        <section className="slide slide--cover" data-index="11" data-title="Cierre">
          <div className="port-grid" aria-hidden="true"></div>
          <div className="slide__inner cover__inner">
            <span className="mono-label" data-reveal>[ BICEP_DEPLOY_STATUS · READY ]</span>
            <h1 className="display-giant title-stack" data-reveal>
              <span>LISTO PARA</span><span className="t-sunray">DESPLEGAR</span>
            </h1>
            <p className="body-lg" data-reveal>Infraestructura del HUB Digital IHP en dos fases: un MVP para validar (~$120/mes) y una produccion blindada dimensionada a la escala real. Eficiencia, escala y seguridad — un puerto moderno en la nube.</p>
            <div className="deploy-line" data-reveal>
              <span className="status-dot"></span>
              <span className="mono">az deployment group create -f MVP.bicep | Produccion.bicep</span>
            </div>
            <div className="cta-row" data-reveal>
              <button className="btn btn--ghost" onClick={() => goTo(0)}>VOLVER AL INICIO</button>
            </div>
          </div>
        </section>
      </main>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
